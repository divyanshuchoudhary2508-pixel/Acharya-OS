name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  repo-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required build docs
        run: |
          grep -Fq 'x86_64-elf-gcc' README.md
          grep -Fq 'x86_64-elf-ld' README.md
          grep -Eq '^CC[[:space:]]*:= x86_64-elf-gcc$' Makefile
          grep -Eq '^LD[[:space:]]*:= x86_64-elf-ld$' Makefile

      - name: Check text files for whitespace issues
        run: git diff --check

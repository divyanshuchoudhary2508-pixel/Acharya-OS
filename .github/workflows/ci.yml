name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  repo-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required build docs
        run: |
          grep -q 'x86_64-elf-gcc' README.md
          grep -q 'x86_64-elf-ld' README.md
          grep -q 'CC := x86_64-elf-gcc' Makefile
          grep -q 'LD := x86_64-elf-ld' Makefile

      - name: Check text files for whitespace issues
        run: git diff --check
